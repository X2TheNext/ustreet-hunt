<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Map — U Street Hunt</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="U Street Hunt">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .map-header {
      flex-shrink: 0;
      padding: 16px 28px 10px;
      text-align: center;
    }
    .map-header h1 { font-size: clamp(20px, 4vw, 28px); }
    #map {
      flex: 1;
      width: 100%;
      /* No height override — flex:1 fills remaining space after header+drawer */
      min-height: 0; /* critical: lets flex shrink below content size */
      border-radius: 0;
    }
    .checkpoint-drawer {
      flex-shrink: 0;
      padding: 16px 28px 24px;
      background: rgba(4, 16, 43, .95);
      border-top: 1px solid var(--line);
    }
    .selected-cp {
      display: none;
    }
    .selected-cp.active { display: block; }
    .cp-info-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cp-emoji {
      font-size: 40px;
    }
    .cp-details { flex: 1; }
    .leaflet-popup-content-wrapper {
      background: var(--navy2) !important;
      color: var(--white) !important;
      border: 1px solid var(--line) !important;
      border-radius: 10px !important;
      font-family: var(--font) !important;
    }
    .leaflet-popup-tip { background: var(--navy2) !important; }
    /* Custom marker */
    .custom-marker {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--blue-bright); border: 3px solid #fff;
      box-shadow: 0 0 20px rgba(91,157,255,.8), 0 0 0 8px rgba(91,157,255,.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: #fff; font-weight: 900;
      animation: markerGlow 2.5s ease-in-out infinite;
    }
    .custom-marker.hq {
      background: #f0c850; border-color: #0a1c41;
      box-shadow: 0 0 22px rgba(240,200,80,.9), 0 0 0 8px rgba(240,200,80,.15);
      animation: markerGlowHQ 2.5s ease-in-out infinite;
    }
    .custom-marker.bonus {
      background: #20c870;
      box-shadow: 0 0 22px rgba(32,200,112,.9), 0 0 0 8px rgba(32,200,112,.15);
      animation: markerGlowBonus 2.5s ease-in-out infinite;
    }
    .custom-marker.collected { background: #3d5a80; box-shadow: 0 0 8px rgba(61,90,128,.3); border-color: #5d7a9f; animation: none; opacity: .6; }
    @keyframes markerGlow { 0%,100% { box-shadow: 0 0 20px rgba(91,157,255,.8), 0 0 0 8px rgba(91,157,255,.12); } 50% { box-shadow: 0 0 30px rgba(91,157,255,1), 0 0 0 14px rgba(91,157,255,.08); } }
    @keyframes markerGlowHQ { 0%,100% { box-shadow: 0 0 22px rgba(240,200,80,.9), 0 0 0 8px rgba(240,200,80,.15); } 50% { box-shadow: 0 0 35px rgba(240,200,80,1), 0 0 0 14px rgba(240,200,80,.08); } }
    @keyframes markerGlowBonus { 0%,100% { box-shadow: 0 0 22px rgba(32,200,112,.9), 0 0 0 8px rgba(32,200,112,.15); } 50% { box-shadow: 0 0 35px rgba(32,200,112,1), 0 0 0 14px rgba(32,200,112,.08); } }
    .location-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--navy2);
      border: 1px solid var(--line);
      color: var(--white);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="map-header wrap">
  <div class="eyebrow">Cookies DC × ATCHÉ</div>
  <h1>U Street <span class="grad">Corridor Map</span></h1>
</div>

<div id="map"></div>

<div class="checkpoint-drawer selected-cp" id="drawer">
  <div class="cp-info-row">
    <span class="cp-emoji" id="drawer-emoji">🍪</span>
    <div class="cp-details">
      <div style="font-weight:800;font-size:16px;" id="drawer-name">Cookies DC</div>
      <div style="font-size:11px;color:var(--muted);" id="drawer-address"></div>
      <div style="font-size:12px;color:var(--muted);" id="drawer-perk"></div>
    </div>
    <div style="text-align:right;">
      <div style="font-weight:800;font-size:18px;color:var(--blue-bright);" id="drawer-pts">+10</div>
      <div style="font-size:11px;color:var(--muted);">pts</div>
    </div>
  </div>
  <div class="flex-row mt-1">
    <a href="#" class="btn btn-small btn-block" id="drawer-link">View Checkpoint →</a>
    <button class="btn btn-ghost btn-small btn-block" id="drawer-scan">📷 Scan QR</button>
  </div>
  <div id="drawer-badge" class="mt-1 text-center"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
<script>
  // Checkpoint data — sourced from app.js CHECKPOINTS (falls back to inline if needed)
  var mapCheckpoints = (typeof CHECKPOINTS !== 'undefined') ? CHECKPOINTS : [
    {id:'cookies-dc',name:'Cookies DC',address:'1115 U St NW, Washington, DC 20009',lat:38.91720,lng:-77.02779,points:0,type:'hq',perk:'Registration & Redemption HQ',emoji:'🍪'},
    {id:'whitlows',name:"Whitlow's",address:'901 U St NW, Washington, DC 20001',lat:38.91690,lng:-77.02449,points:10,type:'checkpoint',perk:'$5 appetizer menu',emoji:'🍔'},
    {id:'service-bar',name:'Service Bar',address:'926-928 U St NW, Washington, DC 20001',lat:38.91700,lng:-77.02492,points:10,type:'checkpoint',perk:'Free side with any order',emoji:'🍹'},
    {id:'oohs-and-ahhs',name:'Oohs & Ahhs',address:'1005 U St NW, Washington, DC 20001',lat:38.91708,lng:-77.02618,points:10,type:'checkpoint',perk:'Free dessert with entree',emoji:'🍽️'},
    {id:'tipsy-hookah',name:'Tipsy Hookah Lounge',address:'1212 U St NW, Washington, DC 20009',lat:38.91715,lng:-77.02889,points:10,type:'checkpoint',perk:'Free tea with any hookah',emoji:'💨'},
    {id:'pure',name:'Pure Lounge',address:'1326 U St NW, Washington, DC 20009',lat:38.91732,lng:-77.03124,points:10,type:'checkpoint',perk:'Free entry before 11pm',emoji:'🎵'},
    {id:'1942-lounge',name:'1942 Lounge',address:'1344 U St NW, Washington, DC 20009',lat:38.91734,lng:-77.03156,points:10,type:'checkpoint',perk:'10% off first drink',emoji:'🥃'},
    {id:'dna',name:'DNA Lounge',address:'1350 U St NW, Washington, DC 20009',lat:38.91737,lng:-77.03187,points:10,type:'checkpoint',perk:'Buy one get one half off',emoji:'🧬'},
    {id:'chi-cha',name:'Chi-Cha Lounge',address:'1624 U St NW, Washington, DC 20009',lat:38.91682,lng:-77.03752,points:10,type:'checkpoint',perk:'10% off hookah + Finale',emoji:'🌙'},
    {id:'bens',name:"Ben's Chili Bowl",address:'1213 U St NW, Washington, DC 20009',lat:38.91713,lng:-77.02881,points:20,type:'bonus',perk:'Free chili dog with any Half-Smoke — BONUS',emoji:'🌭'},
    {id:'lincoln',name:'Lincoln Theatre',address:'1215 U St NW, Washington, DC 20009',lat:38.91718,lng:-77.02891,points:10,type:'checkpoint',perk:'Photo op at the marquee — post & tag to earn stamp',emoji:'🎭'}
  ];

  // Initialize map centered on U Street corridor
  var map = L.map('map', {
    zoomControl: true,
    attributionControl: false,
  }).setView([38.9171, -77.0300], 15);

  // Force Leaflet to recalculate container size after DOM settles
  setTimeout(() => map.invalidateSize(), 100);

  // Dark-themed tiles (CartoDB Dark Matter — no API key required)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd',
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  }).addTo(map);

  // Locate button (top-right)
  const LocateBtn = L.Control.extend({
    options: { position: 'topright' },
    onAdd: function() {
      const btn = L.DomUtil.create('button', 'location-btn');
      btn.innerHTML = '📍';
      btn.title = 'Find my location';
      btn.onclick = function(e) {
        e.preventDefault();
        map.locate({ setView: true, maxZoom: 17 });
      };
      return btn;
    }
  });
  new LocateBtn().addTo(map);

  // Fit-all button (top-left, as a proper Leaflet control)
  const FitBtn = L.Control.extend({
    options: { position: 'topleft' },
    onAdd: function() {
      const btn = L.DomUtil.create('button', 'location-btn');
      btn.innerHTML = '🔲';
      btn.title = 'Show all checkpoints';
      btn.onclick = function(e) {
        e.preventDefault();
        map.fitBounds(mapCheckpoints.map(cp => [cp.lat, cp.lng]), { padding: [40, 40], maxZoom: 16 });
      };
      return btn;
    }
  });
  new FitBtn().addTo(map);

  // Build markers
  const drawer = document.getElementById('drawer');

  mapCheckpoints.forEach(cp => {
    const earned = userStamps.includes(cp.id);
    const markerClass = cp.type === 'hq' ? 'hq' : cp.type === 'bonus' ? 'bonus' : '';

    const icon = L.divIcon({
      className: `custom-marker ${markerClass} ${earned ? 'collected' : ''}`,
      html: earned ? '✅' : cp.emoji,
      iconSize: [40, 40],
      iconAnchor: [20, 20],
      popupAnchor: [0, -20],
    });

    const popupContent = `
      <div style="text-align:center;min-width:140px;">
        <div style="font-size:24px;">${cp.emoji}</div>
        <div style="font-weight:800;font-size:14px;margin-top:4px;">${cp.name}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;">${cp.address || ''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px;">${cp.perk}</div>
        <div style="font-weight:700;color:var(--blue-bright);margin-top:4px;">
          ${cp.points > 0 ? '+' + cp.points + ' pts' : 'HQ'}
          ${earned ? ' ✓ Collected' : ''}
        </div>
        <a href="checkpoint.html?id=${cp.id}" style="color:var(--blue-bright);font-size:11px;font-weight:700;">Details →</a>
      </div>
    `;

    const marker = L.marker([cp.lat, cp.lng], { icon }).addTo(map);
    marker.bindPopup(popupContent);

    marker.on('click', () => {
      drawer.classList.add('active');
      document.getElementById('drawer-emoji').textContent = cp.emoji;
      document.getElementById('drawer-name').textContent = cp.name;
      document.getElementById('drawer-address').textContent = cp.address || '';
      document.getElementById('drawer-perk').textContent = cp.perk;
      document.getElementById('drawer-pts').textContent = cp.points > 0 ? `+${cp.points}` : 'HQ';
      document.getElementById('drawer-link').href = `checkpoint.html?id=${cp.id}`;

      const badgeEl = document.getElementById('drawer-badge');
      badgeEl.innerHTML = earned
        ? `<span class="badge badge-gold">✓ Already collected</span>`
        : `<span class="badge badge-blue">Not yet stamped</span>`;

      document.getElementById('drawer-scan').onclick = async function() {
        if (!isLoggedIn()) {
          showToast('Register first!', 'error');
          return;
        }
        if (earned) {
          showToast('Already collected this stamp!', 'error');
          return;
        }
        const result = await earnStamp(cp.id, cp.name, cp.points);
        if (result.error) { showToast(result.error, 'error'); return; }
        showToast(`+${cp.points} pts at ${cp.name}! 🎉`);
        launchConfetti();
        map.closePopup();
      };
    });
  });

  // Show user location
  map.on('locationfound', function(e) {
    L.circleMarker(e.latlng, {
      radius: 8,
      fillColor: '#5b9dff',
      color: '#fff',
      weight: 2,
      fillOpacity: 0.8,
    }).addTo(map).bindPopup('You are here').openPopup();
  });
  map.on('locationerror', function() {
    showToast("Can't find your location. Check your GPS permissions.", 'error');
  });

  // Try to locate on load
  setTimeout(() => map.locate({ setView: false, maxZoom: 17 }), 1500);
</script>

</body>
</html>
